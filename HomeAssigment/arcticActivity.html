<html>

<head>

    <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>
    <script
        src="https://cdn.jsdelivr.net/gh/c-frame/aframe-particle-system-component@1.2.0/dist/aframe-particle-system-component.min.js"></script>
    <script
        src="https://cdn.jsdelivr.net/npm/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>

    <script src="sripts/telaportFunctions.js"></script>
    <script src="sripts/hoverFunction.js"></script>

    <script src="sripts/arcticActivity/temperature.js"></script>

</head>

<body>
    <a-scene temp-controller >
        <a-assets>
            <a-asset-item id="Artic" src="3D-models/homeAssigment/arctic/arctic_landscape_low-poly.glb"></a-asset-item>
            <a-asset-item id="button" src="3D-models/homeAssigment/arctic/red_button.glb"></a-asset-item>

            <a-asset-item id="seal"
                src="3D-models/homeAssigment/arctic/dotted_white_seal_-_free_giveaway.glb"></a-asset-item>
            <a-asset-item id="penguin" src="3D-models/homeAssigment/arctic/penguin.glb"></a-asset-item>
            <a-asset-item id="polarbear" src="3D-models/homeAssigment/arctic/polar_bear.glb"></a-asset-item>
            <a-asset-item id="ice_berg" src="3D-models/homeAssigment/arctic/iceber01.glb"></a-asset-item>
            <a-asset-item id="wolf" src="3D-models/homeAssigment/arctic/arctic_wolf_psx.glb"></a-asset-item>
            <a-asset-item id="lab" src="3D-models/homeAssigment/mainarea/low_poly_sci-fi_lab.glb"></a-asset-item>
            <a-asset-item id="pillar" src="3D-models/homeAssigment/mainarea/medieval_sci-fi_pillar.glb"></a-asset-item>

            <img id="skyArctic" src="northern-lights-3273425_640.jpg">


        </a-assets>




        <a-entity environment="preset: arches; lighting: none"></a-entity>
        <a-light type="ambient" intensity="1" color="#ffffff"></a-light>


        <a-light id="articAreaLight" light="angle: 33.36" type="spot" position="0.52799 2.46232 3.05534"
            target="#articAreaTarget" visible="false"></a-light>


        <a-entity id="articAreaTarget" position="0.28986 -0.49666 3.15368"></a-entity>




        <a-sky src="#skyArctic" rotation="0 0 -90"></a-sky>

        <a-entity gltf-model="#Artic" position="0 -7 0" scale="3 3 3"></a-entity>

        <a-entity class="iceBox" gltf-model="#ice_berg" position="57.52483 9.7227 -58.33601" scale="10 10 10"
            rotation="0 0 180"></a-entity>

        <a-entity id="snowSystem" particle-system="preset: snow; particleCount: 5000;" position="0 10 -20"></a-entity>

        <a-box position="0 2 0" depth="8" height="4" width="8" color="#444" opacity="0.3"
            material="side: double; transparent: true;"></a-box>

        <a-plane position="0 2 -2" rotation="0 0 0" width="3" height="2" color="#000" opacity="0"
            visible="false"></a-plane>

        <a-entity id="temperatureText" text="value: Temperature: 0°C; color: white; width: 4;"
            position="0 3 -4"></a-entity>

        <a-entity id="activityexplanationArctic"
            text="value: Welcome to the Arctic activity! Playing is simple: press the red button to increase the temperature or the blue button to decrease it. After pressing a button, look around to see how the ecosystem changes.; align: center; width: 3; color: #2133"
            position="0.07977 1.79304 -3.32715" look-at="#camera">
            <a-plane id="textbackgroundArcticActivity" geometry="height: 1.24; width: 3.44" position="0 0.01259 -0.1"
                height="5" width="15" color="#000000" opacity="0.5"></a-plane>
        </a-entity>



        <a-sphere id="increaseBtn" position="-1.4457 1.3624 -2.92878" depth="0.2" height="0.5" width="0.2"
            color="#ff5555" class="clickable" scale="0.1 0.1 0.1">

        </a-sphere>


        <a-entity gltf-model="#button" position="1.5 0 -3" scale="0.5 0.5 0.5"></a-entity>
        <a-entity gltf-model="#button" position="-1.5 0 -3" scale="0.5 0.5 0.5"></a-entity>


        <a-sphere id="decreaseBtn" position="1.56668 1.33697 -2.93643" depth="0.2" height="0.5" width="0.2"
            color="#55aaff" class="clickable" scale="0.1 0.1 0.1">

        </a-sphere>


        <a-sound id="articMusic" src="audio/arctic/arctic-winds-northpole-nr2-17693.mp3" loop="true" autoplay="true" volume="0.2"
            position="1.08478 2 -3.82064">
        </a-sound>



        <a-entity position="0.89969 -0.70915 3" scale="0.6 0.6 0.6">
            <a-gltf-model src="#pillar" scale="0.5 0.5 0.5"></a-gltf-model>
            <a-entity id="ArticContainer" position="-1 3.3 0.17827" scale="0.09 0.09 0.09"
                spin-on-hover="spotlightId: #articAreaLight"
                page-teleport-on-click="url: arctic.html; prompt: Do you want to go to the activity area?">
                <a-gltf-model src="#Artic"></a-gltf-model>
            </a-entity>
        </a-entity>
