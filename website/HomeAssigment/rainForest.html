        <a-entity id="welcome"
            text="value: Welcome to the rainforest! If you want to learn how the animals in this ecosystem are being affected by climate change and how they are adapting, click on the enlarged models.; align: center; width: 6; color: #2133"
            position="25.03266 3.31453 58.90224" look-at="#camera">
            <a-plane id="textbackgroundForest" geometry="height: 1.53; width: 6.45" position="0 -0.03863 -0.87029"
                height="5" width="15" color="#000000" opacity="0.5"></a-plane>
        </a-entity>


        <a-entity id="frogtext" visible="false"
            text="value: Frogs are very sensitive to climate change because they depend on moist environments to survive. To adapt, they hide in cooler, wetter microhabitats like under leaves or near shaded pools to avoid drying out. Many frog species also shift their breeding times to match new rainfall patterns caused by climate change, increasing the survival chances of their offspring. Some frogs may even be evolving skin that helps them retain moisture better.; align: center; width: 6; color: #2133"
            position="25.43837 3.39599 17.87039" look-at="#camera">
            <a-plane id="textbackground" geometry="height: 3.43; width: 6.65" position="0 -0.01257 -0.86988" height="5"
                width="15" color="#005477 " opacity="0.5" rotation="0 0 -0.1"></a-plane>
        </a-entity>
        <a-entity id="jagurtext" visible="false"
            text="value: Jaguars are adapting to climate change in the rainforest by becoming more active at night when temperatures are cooler. As parts of their habitat dry out or shrink due to climate change, jaguars move to new areas in search of water and prey. They also adjust their diets by hunting different animals if their usual prey becomes scarce, 
            showing flexibility that helps them survive in a changing environment.; align: center; width: 6; color: #2133"
            position="6.61641 5.70605 -5.65404" look-at="#camera">
            <a-plane id="textbackground" geometry="width: 5.98; height: 3.05" position="0 0 -0.1" height="5" width="15"
                color="#005477 " opacity="0.5" rotation="0 0 0"></a-plane>
        </a-entity>
        <a-entity id="monkeytext" visible="false"
            text="value: Monkeys, such as howler and spider monkeys, cope with climate change by resting more during the hottest parts of the day and staying in higher, cooler parts of the tree canopy. They sometimes form smaller groups to reduce competition for limited food caused by climate change. Additionally, monkeys may follow fruiting trees that shift their locations due to changing rainfall patterns brought on by climate change.; align: center; width: 6; color: #2133"
            position="7.33902 3.67278 35.23832" look-at="#camera">
            <a-plane id="textbackground" geometry="width: 5.98; height: 3.05" position="0 0 -0.1" height="5" width="15"
                color="#005477 " opacity="0.5" rotation="0 0 0"></a-plane>

        </a-entity>

        <a-entity id="birdtext" visible="false"
            text="value: Rainforest birds such as toucans, parrots, and hummingbirds respond to climate change by moving to higher elevations where temperatures are cooler. They often adjust their nesting times or choose different nesting spots to better suit the changing weather caused by climate change. Birds also adapt their diets by eating a wider variety of insects and fruits if their preferred food sources become less available due to climate change.; align: center; width: 6; color: #2133"
            position="-23.13148 3.68621 0.18882" look-at="#camera">
            <a-plane id="textbackground" geometry="width: 5.98; height: 3.05" position="0 0 -0.1" height="5" width="15"
                color="#005477 " opacity="0.5" rotation="0 0 0"></a-plane>
