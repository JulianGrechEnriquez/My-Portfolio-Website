    <!-- text -->

    <a-entity id="wolftext" visible="false"
      text="value: Arctic wolves are adapting to climate change by expanding their range in search of food as their usual prey, like musk oxen and Arctic hares, move to new areas. As warming temperatures change the timing of seasons, Arctic wolves are adjusting when they breed and hunt. Climate change is also leading to more human activity in the Arctic, so wolves must adapt to more disturbances and changes in their habitat; align: center; width: 6; color: #2133"
      position="-7.4127 2.82891 -28.17743" look-at="#camera">
      <a-plane id="Wolftextbackground" geometry="height: 3.19; width: 6.88" position="0 0 -0.1" height="5" width="15"
        color="#005477 " opacity="0.5" material="color: #005477"></a-plane>
    </a-entity>

    <a-entity id="penguintext" visible="false"
      text="value:  Penguins, especially those in the Antarctic like emperor and Adélie penguins, are being affected by climate change as sea ice melts earlier in the year. To adapt, some penguin colonies are moving to colder regions where ice is more stable. They are also changing their breeding times to match the new ice and food conditions caused by climate change. However, the loss of ice makes it harder to find food like krill, so penguins must swim longer distances, which affects their survival; align: center; width: 6; color: #2133"
      position="-12.77558 2.82891 3.99713" look-at="#camera">
      <a-plane id="Penguintextbackground" geometry="width: 5.98; height: 3.05" position="0 0 -0.1" height="5" width="15"
        color="#005477 " opacity="0.5" rotation="0 0 0"></a-plane>
    </a-entity>

    <a-entity id="sealtext" visible="false"
      text="value: Seals, like ringed and harp seals, are facing challenges from climate change as melting ice affects where they rest, breed, and raise their pups. In response, some seals are giving birth earlier or using land instead of ice. They are also swimming farther to find food as fish patterns shift due to warmer waters. Climate change is forcing seals to be more flexible, but it also makes young pups more vulnerable without stable ice.; align: center; width: 6; color: #2133"
      position="43.51405 4.86399 35.43375" look-at="#camera">
      <a-plane id="sealTextBackground" geometry="width: 5.98; height: 3.05" position="0 0 -0.1" height="5" width="15"
        color="#005477 " opacity="0.5" rotation="0 0 0"></a-plane>
    </a-entity>

    <a-entity id="narwhaltext" visible="false"
      text="value: Narwhals are Arctic whales known for their long tusks, and they are also affected by climate change. As sea ice melts and breaks up earlier, narwhals are changing their migration routes and timing. They are diving deeper and traveling longer distances to find their favorite fish, like Arctic cod, which are moving due to warmer waters. Narwhals must also adapt to more ships and human activity in their habitat as climate change opens the Arctic; align: center; width: 6; color: #2133"
      position="-4.52434 -0.20517 47.87724" look-at="#camera">
      <a-plane id="narwhaltextbackground" geometry="width: 5.98; height: 3.05" position="0 0 -0.1" height="5" width="15"
        color="#005477 " opacity="0.5" rotation="0 0 0"></a-plane>
    </a-entity>


    <a-entity id="polar_beartext" visible="false"
      text="value: Polar bears are strongly affected by climate change because they rely on sea ice to hunt seals. As the ice melts earlier and forms later each year, polar bears are adapting by swimming longer distances and spending more time on land. Some are shifting their diets by eating bird eggs, fish, or even human garbage when seals are not available. However, these changes are not always enough to replace the food they lose due to climate change.; align: center; width: 6; color: #2133"
      position="25.9948 6.28521 -9.56884" look-at="#camera">
      <a-plane id="polar_beartextbackground" geometry="width: 5.98; height: 3.05" position="0 0 -0.1" height="5"
        width="15" color="#005477 " opacity="0.5" rotation="0 0 0"></a-plane>
    </a-entity>

    <a-entity
